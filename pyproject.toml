[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "toas"
version = "0.1.0"
description = "Transcript-Oriented Agent System"
requires-python = ">=3.10"

dependencies = [
    "PyYAML>=6.0",
]

# optional: only if/when you actually wire LLM calls
optional-dependencies.llm = [
    "openai>=1.0.0",
]

[project.scripts]
toas = "toas.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
toas = ["py.typed"]
