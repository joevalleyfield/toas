[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "toas"
version = "0.1.0"
description = "Transcript-Oriented Agent System"
requires-python = ">=3.10"

dependencies = [
    "PyYAML>=6.0",
]

[project.optional-dependencies]
llm = [
    "openai>=1.0.0",
]

[project.scripts]
toas = "toas.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
toas = ["py.typed", "prompts/**/*.txt"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
